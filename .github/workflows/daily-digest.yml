name: Daily digest

# Sends Dee the Hezzian daily digest at 09:00 UK time, every day.
#
# GitHub cron is UTC and does NOT follow British Summer Time, so we trigger at BOTH 08:00 and
# 09:00 UTC and a gate job lets exactly ONE proceed — the one that is 09:00 in Europe/London:
#   - BST (summer, UTC+1): 08:00 UTC = 09:00 London  -> send;  09:00 UTC = 10:00 -> skip
#   - GMT (winter, UTC+0): 09:00 UTC = 09:00 London  -> send;  08:00 UTC = 08:00 -> skip
# workflow_dispatch (manual) always sends, regardless of the hour.
#
# Requires repo secrets: DIGEST_SMTP_USER, DIGEST_SMTP_PASSWORD (Gmail app password), DIGEST_TO, DIGEST_FROM.
# NOTE: the source for the daily digest is controlled by the DIGEST_SOURCE repo variable (Settings >
# Variables > Actions). It defaults to "sample" so CI stays green with no Postgres required.
# To switch to the real relevance-ranked digest once a production Postgres + ingestion pipeline are
# running:
#   1. Set the DIGEST_SOURCE repo variable to "postgres".
#   2. Add a DATABASE_URL repo secret pointing at the production Postgres instance
#      (postgresql+asyncpg://user:pass@host:port/db).
# The workflow passes DATABASE_URL from secrets; it is ignored (empty) when source is "sample".

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC = 09:00 London during BST (summer)
    - cron: "0 9 * * *" # 09:00 UTC = 09:00 London during GMT (winter)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gate:
    name: gate (09:00 Europe/London, DST-safe)
    runs-on: ubuntu-latest
    outputs:
      send: ${{ steps.check.outputs.send }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch -> send"
            echo "send=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ='Europe/London' date +%H)" = "09" ]; then
            echo "09:00 Europe/London -> send"
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "not 09:00 Europe/London (hour=$(TZ='Europe/London' date +%H)) -> skip"
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

  send-digest:
    name: send daily digest
    needs: gate
    if: needs.gate.outputs.send == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create venv
        run: |
          uv venv --python 3.12
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install project (runtime only)
        run: uv pip install -e .

      - name: Send daily digest
        env:
          DIGEST_SMTP_USER: ${{ secrets.DIGEST_SMTP_USER }}
          DIGEST_SMTP_PASSWORD: ${{ secrets.DIGEST_SMTP_PASSWORD }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          # Not used by the digest path, but set so any Settings import can't fail (non-secret placeholder).
          STATE_STORE_KEY: ci-digest-placeholder-not-used-000000000000
          # Source defaults to "sample" (no Postgres in CI). Set the DIGEST_SOURCE repo variable to
          # "postgres" and add a DATABASE_URL secret to send the real relevance-ranked digest.
          DIGEST_SOURCE: ${{ vars.DIGEST_SOURCE || 'sample' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scrapeforge digest send --yes --source "$DIGEST_SOURCE"
