name: Daily digest

# Sends Dee the Hezzian daily digest every morning.
# - schedule: runs automatically once merged to the default branch (GitHub cron is UTC, best-effort).
# - workflow_dispatch: manual trigger (works on any branch) so we can test before/after merge.
#
# Requires these repository secrets (Settings → Secrets and variables → Actions):
#   DIGEST_SMTP_USER, DIGEST_SMTP_PASSWORD (Gmail app password), DIGEST_TO, DIGEST_FROM
# Preview mode needs none; this job SENDS for real via SMTP.
#
# NOTE: until the source buckets + AI brief (Phase 9) land, this sends the BUNDLED SAMPLE digest —
# it proves the daily delivery cadence end-to-end. Swap `--source sample` for a real corpus later.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily (~07:00 London). Adjust to taste.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-digest:
    name: send daily digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create venv
        run: |
          uv venv --python 3.12
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install project (runtime only)
        run: uv pip install -e .

      - name: Send daily digest
        env:
          DIGEST_SMTP_USER: ${{ secrets.DIGEST_SMTP_USER }}
          DIGEST_SMTP_PASSWORD: ${{ secrets.DIGEST_SMTP_PASSWORD }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          # Not used by the digest path, but set so any Settings import can't fail (non-secret placeholder).
          STATE_STORE_KEY: ci-digest-placeholder-not-used-000000000000
        run: python -m scrapeforge digest send --yes --source sample
