name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (keeps PR feedback fast).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # Ephemeral Postgres (pgvector) for db-marked unit tests.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: scrapeforge
          POSTGRES_PASSWORD: scrapeforge
          POSTGRES_DB: scrapeforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scrapeforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://scrapeforge:scrapeforge@localhost:5432/scrapeforge_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # No uv.lock in this repo (deps live in pyproject.toml; CI installs via `uv pip install -e`).
          # Key the cache off pyproject.toml so setup-uv doesn't hard-error on the default
          # **/uv.lock glob matching nothing.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (+ test/dev extras)
        run: uv pip install --system -e ".[dev,test]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Unit tests (+ coverage report)
        # NOTE: the 80% coverage gate (`--cov-fail-under=80`) is TEMPORARILY RELAXED while this repo is
        # docs + scaffold only — there is no `scrapeforge/` package yet, so coverage measures 0% and the
        # gate could never pass. Coverage is still reported for visibility. RESTORE the gate in the PR
        # that adds the first Phase-1 modules (see planning.MD §0 and CLAUDE.md §3).
        run: pytest -m "not integration" --cov --cov-report=term-missing

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
