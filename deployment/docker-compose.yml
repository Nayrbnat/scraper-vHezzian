# ScrapeForge — single-VPS deployment (ingestion + serving planes on one host).
# Bring up:  docker compose --env-file ../.env up -d --build
# Scale ingestion:  docker compose up -d --scale worker=3
#
# Secrets come from ../.env (NEVER committed). See DEPLOYMENT.md for the full runbook.

name: scrapeforge

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://scrapeforge:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/scrapeforge
  REDIS_URL: redis://redis:6379/0
  OBJECT_STORE_ENDPOINT: http://minio:9000
  OBJECT_STORE_BUCKET: scrapeforge-raw
  OBJECT_STORE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  OBJECT_STORE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  OBJECT_STORE_REGION: us-east-1
  STATE_STORE_KEY: ${STATE_STORE_KEY:?set in .env}
  STATE_STORE_PATH: /data/states
  PROXY_LIST_PATH: /data/proxies.txt
  NODRIVER_SERVICE_URL: http://nodriver:8081
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: json

services:
  # --- Serving plane (light, stateless): read + enqueue API. Never drives a browser. ---
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    environment:
      <<: *app-env
      API_KEYS: ${API_KEYS:?comma-separated keys in .env}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    expose:
      - "8000"
    restart: unless-stopped

  # --- Ingestion plane (heavy): SCRAPER worker. Stateless w.r.t. the serving DB —
  #     fetches, archives the RAW payload to object storage (claim-check), and publishes a
  #     pointer to the results queue. Never writes Postgres. Scale with --scale scraper-worker=N. ---
  scraper-worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.worker
    command: ["python", "-m", "scrapeforge.worker.run_scraper"]
    environment: *app-env
    depends_on:
      redis: { condition: service_started }
      minio: { condition: service_started }
      nodriver: { condition: service_started }
    volumes:
      - state-data:/data          # encrypted session states + proxies.txt (mounted, not baked)
    shm_size: "1gb"               # Chrome needs shared memory headroom (future browser drivers)
    restart: unless-stopped

  # --- Processing plane: TRANSFORM worker. The SOLE writer of structured data + Job status.
  #     Reads raw from object storage, validates/normalizes, idempotent-UPSERTs into Postgres.
  #     No browser (slim api image). Scale with --scale transform-worker=N. ---
  transform-worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    command: ["python", "-m", "scrapeforge.worker.run_transform"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    restart: unless-stopped

  # --- Summarizer: scores + 5-bullet summaries for un-summarized articles via an OpenAI-
  #     compatible LLM (default free GLM-4.5-Flash). Reads/writes Postgres only. ---
  summarizer:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    command: ["python", "-m", "scrapeforge.worker.run_summarize"]
    environment:
      <<: *app-env
      SUMMARY_API_KEY: ${SUMMARY_API_KEY:-}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-glm-4.5-flash}
      SUMMARY_API_BASE_URL: ${SUMMARY_API_BASE_URL:-https://api.z.ai/api/paas/v4}
      SUMMARY_PORTFOLIO: ${SUMMARY_PORTFOLIO:-}
      SUMMARY_INTERESTS: ${SUMMARY_INTERESTS:-}
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # --- Community-ingest worker: scrapes whole publications (the 50 Substacks) on the INGEST
  #     queue and persists their parsed articles directly (Invariant #18 carve-out). No browser. ---
  community-ingest:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    command: ["python", "-m", "scrapeforge.worker.run_community_ingest"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    restart: unless-stopped

  # --- Scheduler: enqueues recurring scrapes per configured sources ("continuously populate"). ---
  scheduler:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    command: ["python", "-m", "scrapeforge.worker.run_scheduler"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  # --- AGPL-isolated nodriver service (separate process boundary; never imported into the app). ---
  nodriver:
    build:
      context: ../services/nodriver_service
      dockerfile: Dockerfile
    expose:
      - "8081"
    shm_size: "1gb"
    restart: unless-stopped

  # --- Shared datastore: Postgres with pgvector (for future semantic search). ---
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: scrapeforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: scrapeforge
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapeforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Job + results queues (Redis lists; reliable-queue pattern with a DLQ). ---
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # --- Object store: immutable RAW payloads (claim-check). S3-compatible; swap to AWS S3/GCS
  #     by changing OBJECT_STORE_ENDPOINT only. ---
  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Reverse proxy + automatic HTTPS in front of the API. ---
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?your public hostname in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  minio-data:
  state-data:
  caddy-data:
  caddy-config:
